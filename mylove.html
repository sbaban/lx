<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给你的小惊喜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .tip {
            margin-bottom: 20px;
            color: #666;
            font-size: 16px;
        }
        #loading {
            color: #999;
            font-size: 14px;
        }
        #pixelCanvas {
            display: none;
            max-width: 90vw;
            max-height: 85vh;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <div class="tip">用鼠标/手指划过画面，慢慢看清惊喜 ✨</div>
    <div id="loading">惊喜加载中...</div>
    <canvas id="pixelCanvas"></canvas>

    <script>
        // ========== 可自定义配置 ==========
        const MIN_CELL_SIZE = 6;    // 最小方块尺寸，数值越小最终画面越清晰，推荐4-12
        const IMAGE_SRC = 'test.jpg'; // 你的惊喜图片路径，和html同目录直接写文件名
        // ==================================

        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const loadingTip = document.getElementById('loading');
        let imageData;
        let rootNode;
        let canvasSize;

        // 四叉树节点类
        class QuadNode {
            constructor(x, y, size) {
                this.x = x;       // 方块左上角x坐标
                this.y = y;       // 方块左上角y坐标
                this.size = size; // 方块边长
                this.color = getRegionAverageColor(x, y, size, size);
                this.children = [];
            }

            // 分裂为4个子节点
            split() {
                // 已经分裂过 或 达到最小尺寸则不再分裂
                if (this.children.length > 0 || this.size <= MIN_CELL_SIZE) return;
                const half = this.size / 2;
                this.children.push(new QuadNode(this.x, this.y, half));
                this.children.push(new QuadNode(this.x + half, this.y, half));
                this.children.push(new QuadNode(this.x, this.y + half, half));
                this.children.push(new QuadNode(this.x + half, this.y + half, half));
            }

            // 获取所有末端叶子节点
            getLeaves() {
                if (this.children.length === 0) return [this];
                let leaves = [];
                for (const child of this.children) {
                    leaves = leaves.concat(child.getLeaves());
                }
                return leaves;
            }
        }

        // 计算指定区域的平均颜色（修复索引计算，增加边界保护）
        function getRegionAverageColor(x, y, w, h) {
            const data = imageData.data;
            const imgWidth = imageData.width;
            let r = 0, g = 0, b = 0, count = 0;

            // 边界限制，防止像素越界
            const startX = Math.max(0, Math.floor(x));
            const startY = Math.max(0, Math.floor(y));
            const endX = Math.min(imgWidth, Math.ceil(x + w));
            const endY = Math.min(imageData.height, Math.ceil(y + h));

            // 步长为2，兼顾颜色准确度和性能
            for (let py = startY; py < endY; py += 2) {
                for (let px = startX; px < endX; px += 2) {
                    const idx = (py * imgWidth + px) * 4;
                    r += data[idx];
                    g += data[idx + 1];
                    b += data[idx + 2];
                    count++;
                }
            }

            // 防止除以0的极端情况
            if (count === 0) return 'rgb(255,255,255)';
            r = Math.round(r / count);
            g = Math.round(g / count);
            b = Math.round(b / count);
            return `rgb(${r},${g},${b})`;
        }

        // 渲染所有叶子节点（圆形）
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const leaves = rootNode.getLeaves();
            for (const node of leaves) {
                const radius = node.size / 2;
                const cx = node.x + radius;
                const cy = node.y + radius;
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.fillStyle = node.color;
                ctx.fill();
            }
        }

        // 处理鼠标/触摸移动，触发分裂
        function handleInteraction(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            if (clientX === undefined || clientY === undefined) return;

            // 转换为画布内部坐标（适配CSS缩放）
            const scale = canvas.width / rect.width;
            const x = (clientX - rect.left) * scale;
            const y = (clientY - rect.top) * scale;

            const leaves = rootNode.getLeaves();
            let needUpdate = false;
            for (const node of leaves) {
                const radius = node.size / 2;
                const cx = node.x + radius;
                const cy = node.y + radius;
                // 鼠标在圆内则触发分裂
                const distance = Math.hypot(x - cx, y - cy);
                if (distance < radius && node.size > MIN_CELL_SIZE) {
                    node.split();
                    needUpdate = true;
                }
            }
            if (needUpdate) requestAnimationFrame(render);
        }

        // 初始化：加载图片并生成初始大圆
        function init() {
            const img = new Image();
            img.crossOrigin = 'anonymous';

            // 图片加载失败提示
            img.onerror = () => {
                loadingTip.textContent = '图片加载失败，请检查文件名是否为 surprise.jpg，且和html在同一文件夹';
                loadingTip.style.color = '#e53e3e';
            };

            img.onload = () => {
                try {
                    // 以图片最长边为基准，生成正方形画布，适配任意比例图片
                    canvasSize = Math.max(img.width, img.height);
                    canvas.width = canvasSize;
                    canvas.height = canvasSize;

                    // 离屏画布提取像素数据
                    const offscreen = document.createElement('canvas');
                    offscreen.width = canvasSize;
                    offscreen.height = canvasSize;
                    const offCtx = offscreen.getContext('2d');
                    offCtx.fillStyle = '#ffffff';
                    offCtx.fillRect(0, 0, canvasSize, canvasSize);
                    // 图片居中绘制
                    offCtx.drawImage(
                        img,
                        (canvasSize - img.width) / 2,
                        (canvasSize - img.height) / 2
                    );

                    // 读取像素数据（file协议打开会在这里报错）
                    imageData = offCtx.getImageData(0, 0, canvasSize, canvasSize);

                    // 初始化根节点（初始大圆）
                    rootNode = new QuadNode(0, 0, canvasSize);
                    render();

                    // 隐藏加载提示，显示画布
                    loadingTip.style.display = 'none';
                    canvas.style.display = 'block';

                    // 绑定交互事件
                    canvas.addEventListener('mousemove', handleInteraction);
                    canvas.addEventListener('touchmove', handleInteraction, { passive: false });
                    canvas.addEventListener('touchstart', handleInteraction, { passive: false });
                } catch (err) {
                    loadingTip.textContent = '加载出错：' + err.message + '（请用本地服务器打开，不要直接双击html文件）';
                    loadingTip.style.color = '#e53e3e';
                    console.error(err);
                }
            };

            img.src = IMAGE_SRC;
        }

        init();
    </script>
</body>
</html>
